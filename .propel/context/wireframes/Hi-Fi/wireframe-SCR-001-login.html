<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — SCR-001</title>
  <style>
    /* Design Tokens */
    :root{
      --primary: #007BFF;
      --primary-hr: #0056B3;
      --success: #16A34A;
      --warning: #F59E0B;
      --error: #DC2626;
      --bg: #F8F9FA;
      --text: #111827;
      --font-heading: "InterVariable", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      --font-body: "InterVariable", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      --space: 8px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --elev-1: 0 1px 2px rgba(16,24,40,0.05);
      --dur-short: 150ms;
      --dur-med: 300ms;
    }

    /* Reset & Base */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: linear-gradient(180deg, #FFFFFF 0%, var(--bg) 100%);
      color:var(--text);
      font-family:var(--font-body);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      line-height:1.25;
      padding: calc(var(--space) * 4);
    }

    /* Layout */
    .layout{
      max-width:420px;
      margin: 40px auto;
    }
    .card{
      background:white;
      border-radius:var(--radius-md);
      box-shadow:var(--elev-1);
      padding: calc(var(--space) * 3);
      border: 1px solid rgba(16,24,40,0.04);
    }

    /* Brand Header */
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:calc(var(--space) * 2);
    }
    .logo{
      width:44px;
      height:44px;
      flex:0 0 44px;
      display:inline-grid;
      place-items:center;
      border-radius:8px;
      background:linear-gradient(135deg,var(--primary),var(--primary-hr));
      color:white;
      font-weight:700;
      font-size:18px;
      box-shadow: 0 2px 6px rgba(0,123,255,0.12);
    }
    .brand h1{
      margin:0;
      font-family:var(--font-heading);
      font-size:18px;
      color:var(--text);
      letter-spacing: -0.01em;
    }
    .brand p{
      margin:0;
      margin-top:4px;
      font-size:12px;
      color:#6B7280;
    }

    /* Form */
    form{margin-top:8px}
    .field{
      margin-bottom: calc(var(--space) * 2);
    }
    label{
      display:block;
      font-size:13px;
      margin-bottom:6px;
      color:#374151;
      font-weight:600;
    }
    .input{
      width:100%;
      padding: calc(var(--space) * 1.25) calc(var(--space) * 1);
      border-radius:var(--radius-sm);
      border:1px solid #E6E8F0;
      background:white;
      font-size:14px;
      color:var(--text);
      transition: box-shadow var(--dur-short), border-color var(--dur-short);
    }
    .input:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow: 0 0 0 4px rgba(0,123,255,0.06);
    }
    .input[aria-invalid="true"]{
      border-color:var(--error);
      box-shadow: 0 0 0 4px rgba(220,38,38,0.06);
    }
    .row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    /* Password field wrapper */
    .password-wrap{
      position:relative;
    }
    .toggle-btn{
      position:absolute;
      right:6px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:0;
      padding:6px;
      border-radius:6px;
      cursor:pointer;
      color:#6B7280;
    }
    .toggle-btn:focus{outline:2px solid rgba(0,123,255,0.12)}

    .helper{
      font-size:12px;
      color:#6B7280;
      margin-top:6px;
    }
    .helper.error{
      color:var(--error);
    }

    /* Primary CTA */
    .actions{
      margin-top:calc(var(--space) * 1.25);
      display:flex;
      gap:8px;
      align-items:center;
    }
    .btn{
      background:var(--primary);
      color:white;
      border:0;
      padding:10px 14px;
      border-radius:6px;
      font-weight:600;
      cursor:pointer;
      transition: background var(--dur-short), transform var(--dur-short);
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow: 0 1px 2px rgba(16,24,40,0.04);
    }
    .btn:hover{background:var(--primary-hr)}
    .btn:active{transform:translateY(1px)}
    .btn[disabled]{
      opacity:0.6;
      cursor:not-allowed;
      transform:none;
    }

    .secondary{
      background:transparent;
      color:var(--primary);
      border:1px solid rgba(0,123,255,0.12);
      padding:8px 12px;
      border-radius:6px;
      font-weight:600;
      text-decoration:none;
    }

    /* Inline Alert */
    .alert{
      padding:12px;
      border-radius:6px;
      display:flex;
      gap:12px;
      align-items:flex-start;
      font-size:13px;
      margin-bottom:12px;
      border:1px solid rgba(16,24,40,0.04);
    }
    .alert.error{ background: #FFF5F5; border-color: rgba(220,38,38,0.08); color:var(--error)}
    .alert.warn{ background: #FFFBEB; border-color: rgba(245,158,11,0.08); color:var(--warning)}
    .alert.info{ background: #F8FAFF; border-color: rgba(0,123,255,0.06); color:var(--primary);}

    .alert svg{ flex:0 0 20px }

    /* Captcha placeholder */
    .captcha{
      margin-top:12px;
      border-radius:6px;
      padding:12px;
      border:1px dashed rgba(15,23,42,0.06);
      background: #FBFDFF;
      font-size:13px;
      color:#334155;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .captcha .box{
      width:72px;
      height:44px;
      border-radius:4px;
      background:linear-gradient(180deg,#F1F5F9,#E2E8F0);
      display:inline-grid;
      place-items:center;
      color:#0F172A;
      font-weight:700;
    }

    /* Footer links */
    .meta{
      margin-top:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:13px;
      color:#6B7280;
    }
    .links a{ color:var(--primary); text-decoration:none; font-weight:600}
    .links a:hover{ text-decoration:underline }

    /* Spinner */
    .spinner{
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.28);
      border-top-color:rgba(255,255,255,0.96);
      animation:spin 800ms linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg)} }

    /* Small utilities */
    .muted{ color:#6B7280; font-size:13px}
    .sr-only{
      position:absolute;
      left:-9999px;
      width:1px;
      height:1px;
      overflow:hidden;
    }

    /* Responsive */
    @media (max-width:460px){
      body{ padding:16px }
      .layout{ margin-top:16px }
      .brand h1{ font-size:16px }
      .card{ padding:16px }
    }
  </style>
</head>
<body>
  <main class="layout" id="root">
    <div class="card" role="region" aria-labelledby="login-title">
      <div class="brand" aria-hidden="false">
        <div class="logo" aria-hidden="true">AL</div>
        <div>
          <h1 id="login-title">Acme Accounts</h1>
          <p>Secure sign in to your Acme account</p>
        </div>
      </div>

      <!-- Inline alerts (auth error, rate limit, locked) -->
      <div id="alerts" aria-live="polite" aria-atomic="true"></div>

      <!-- Form -->
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required aria-describedby="email-error" />
          <div id="email-error" class="helper" role="alert" aria-live="assertive"></div>
        </div>

        <div class="field password-wrap">
          <label for="password">Password</label>
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required minlength="8" aria-describedby="password-error password-helper" />
          <button type="button" id="toggle-password" class="toggle-btn" aria-pressed="false" aria-label="Show password">
            <!-- eye icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <div id="password-helper" class="helper">Minimum 8 characters.</div>
          <div id="password-error" class="helper error" role="alert" aria-live="assertive"></div>
        </div>

        <!-- CAPTCHA placeholder (conditional) -->
        <div id="captcha-area" class="captcha" style="display:none" aria-hidden="true">
          <div class="box">CAP</div>
          <div>
            <div style="font-weight:700;color:#0F172A">CAPTCHA verification</div>
            <div style="font-size:13px;color:#475569">Complete the CAPTCHA to continue signing in.</div>
          </div>
        </div>

        <div class="actions" style="justify-content:space-between; align-items:center;">
          <button id="submit-btn" class="btn" type="submit" aria-live="polite">
            <span id="btn-content">Sign in</span>
          </button>
          <a class="links" href="wireframe-SCR-002-forgot-password-request.html" id="forgot-link">Forgot password?</a>
        </div>

        <div class="meta">
          <div class="muted">Don't have an account? <a href="wireframe-SCR-005-reset-success.html">Contact support</a></div>
          <div style="font-size:12px;color:#9CA3AF">
            <a class="secondary" href="wireframe-SCR-001-login.html">Back to Login</a>
          </div>
        </div>

        <!-- aria-live region for form-level messages -->
        <div id="form-live" class="sr-only" aria-live="assertive"></div>
      </form>
    </div>

    <!-- Footer quick links to other screens for cross-linking -->
    <nav style="max-width:420px;margin:12px auto 0;display:flex;justify-content:space-between;font-size:13px;color:#6B7280;">
      <div>
        <a href="wireframe-SCR-002-forgot-password-request.html">Forgot password</a> •
        <a href="wireframe-SCR-003-forgot-password-confirmation.html">Reset email sent</a>
      </div>
      <div>
        <a href="wireframe-SCR-004-reset-password.html">Reset (token)</a> •
        <a href="wireframe-SCR-005-reset-success.html">Success</a>
      </div>
    </nav>
  </main>

  <script>
    (function(){
      // Utility tokens
      const STATE = (new URLSearchParams(location.search)).get('state') || 'default';
      const alertsEl = document.getElementById('alerts');
      const captchaArea = document.getElementById('captcha-area');
      const formLive = document.getElementById('form-live');

      // Elements
      const form = document.getElementById('login-form');
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailError = document.getElementById('email-error');
      const passwordError = document.getElementById('password-error');
      const submitBtn = document.getElementById('submit-btn');
      const btnContent = document.getElementById('btn-content');
      const toggle = document.getElementById('toggle-password');

      let loading = false;

      // Render initial state if provided via ?state=
      function renderInitialState(){
        switch(STATE){
          case 'validation-error':
            // show inline validation errors pre-filled
            email.value = 'invalid-email';
            showFieldError(email, 'Please enter a valid email address.');
            showFieldError(password, 'Password must be at least 8 characters.');
            break;
          case 'auth-error':
            showAlert('error', 'Invalid email or password. Please try again.');
            break;
          case 'captcha-required':
            showAlert('warn', 'Multiple failed attempts detected. Complete the CAPTCHA below.');
            showCaptcha(true);
            break;
          case 'locked':
            showAlert('error', 'This account has been locked. Check your email for unlock instructions or contact support.');
            showCaptcha(false);
            disableForm();
            break;
          case 'rate-limited':
            showAlert('warn', 'Too many attempts. Please wait a few minutes and try again.');
            showCaptcha(false);
            disableForm();
            break;
          case 'loading':
            startLoading();
            // simulate long loading then clear
            setTimeout(()=>stopLoading(), 1800);
            break;
          default:
            // default - nothing
            break;
        }
      }

      // Alert helper
      function showAlert(type, text){
        const div = document.createElement('div');
        div.className = 'alert ' + (type === 'error' ? 'error' : (type === 'warn' ? 'warn' : 'info'));
        div.setAttribute('role','alert');
        div.innerHTML = `
          ${type === 'error' ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' : (type === 'warn' ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14" stroke="currentColor" stroke-width="1.5"/><path d="M5 12h14" stroke="currentColor" stroke-width="1.5"/></svg>') }
          <div>${escapeHtml(text)}</div>
        `;
        alertsEl.innerHTML = '';
        alertsEl.appendChild(div);
        // also set to form-live for screen readers
        formLive.textContent = text;
      }

      // Show/hide captcha
      function showCaptcha(show){
        captchaArea.style.display = show ? 'flex' : 'none';
        captchaArea.setAttribute('aria-hidden', show ? 'false' : 'true');
      }

      // Disable form (used for locked/rate-limited)
      function disableForm(){
        email.disabled = true;
        password.disabled = true;
        submitBtn.disabled = true;
        toggle.disabled = true;
      }

      // Field error handling
      function showFieldError(field, message){
        const id = field.id === 'email' ? 'email-error' : 'password-error';
        const el = document.getElementById(id);
        el.textContent = message;
        field.setAttribute('aria-invalid','true');
        formLive.textContent = message;
      }
      function clearFieldError(field){
        const id = field.id === 'email' ? 'email-error' : 'password-error';
        const el = document.getElementById(id);
        el.textContent = '';
        field.removeAttribute('aria-invalid');
      }

      // Basic client-side validation
      function validate(){
        let ok = true;
        clearFieldError(email);
        clearFieldError(password);

        if(!email.value.trim()){
          showFieldError(email, 'Email is required.');
          ok = false;
        } else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())){
          showFieldError(email, 'Please enter a valid email address.');
          ok = false;
        }
        if(!password.value){
          showFieldError(password, 'Password is required.');
          ok = false;
        } else if(password.value.length < 8){
          showFieldError(password, 'Password must be at least 8 characters.');
          ok = false;
        }
        return ok;
      }

      // Loading state for submit button
      function startLoading(){
        loading = true;
        submitBtn.disabled = true;
        btnContent.innerHTML = '<span class="spinner" aria-hidden="true"></span><span style="opacity:0.9">Signing in…</span>';
      }
      function stopLoading(){
        loading = false;
        submitBtn.disabled = false;
        btnContent.textContent = 'Sign in';
      }

      // Toggle password visibility
      toggle.addEventListener('click', function(){
        const isHidden = password.type === 'password';
        password.type = isHidden ? 'text' : 'password';
        toggle.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
        toggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        // toggle icon change
        toggle.innerHTML = isHidden ? `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3l18 18"/><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M9.88 9.88A3 3 0 0 0 14.12 14.12"/><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M10.66 5.2C12 5 13.5 5.6 15 6.8c3 2.1 5 6.2 5 6.2-.9 1.4-2.7 3.8-5 5.1"/><path stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M6.2 6.8C4.9 8 3.5 10.2 2.5 12c.9 1.4 2.7 3.8 5 5.1"/></svg>
        ` : `
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
        `;
      });

      // Preserve toggle icon state initially
      toggle.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.5 12s3.5-6.5 9.5-6.5S21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
      `;

      // Handle form submit
      form.addEventListener('submit', function(ev){
        ev.preventDefault();
        if(loading) return;
        // clear any top alerts
        alertsEl.innerHTML = '';
        formLive.textContent = '';

        if(!validate()){
          return;
        }
        // start loading
        startLoading();

        // Simulate network latency
        setTimeout(() => {
          // Decide outcome based on STATE (simulate server responses)
          if(STATE === 'auth-error'){
            stopLoading();
            showAlert('error','Invalid email or password. Please try again.');
            formLive.textContent = 'Invalid email or password.';
            password.focus();
            // optionally show captcha after auth error
            showCaptcha(true);
            return;
          } else if(STATE === 'captcha-required'){
            stopLoading();
            showAlert('warn','We need to verify you’re not a robot. Complete the CAPTCHA.');
            showCaptcha(true);
            return;
          } else if(STATE === 'locked'){
            stopLoading();
            showAlert('error','Your account is locked due to suspicious activity.');
            disableForm();
            return;
          } else if(STATE === 'rate-limited'){
            stopLoading();
            showAlert('warn','Too many attempts. Try again later.');
            disableForm();
            return;
          } else {
            // success
            btnContent.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Signed in';
            // small visual success then redirect / clear
            setTimeout(() => {
              // For demo, show a success alert and reset button
              alertsEl.innerHTML = '';
              const successDiv = document.createElement('div');
              successDiv.className = 'alert info';
              successDiv.setAttribute('role','status');
              successDiv.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><div>Signed in successfully. Redirecting…</div>';
              alertsEl.appendChild(successDiv);
              formLive.textContent = 'Signed in successfully.';
              // reset after short delay
              setTimeout(()=> {
                stopLoading();
                btnContent.textContent = 'Sign in';
                // In a real app, redirect to dashboard
                // location.href = '/dashboard';
              }, 900);
            }, 400);
          }
        }, 1100);
      });

      // Field-level input events to clear errors
      [email, password].forEach(el=>{
        el.addEventListener('input', ()=> {
          clearFieldError(el);
          alertsEl.innerHTML = '';
        });
      });

      // Escape HTML helper
      function escapeHtml(s){
        return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]) });
      }

      // Initialize view
      renderInitialState();
    })();
  </script>
</body>
</html>
